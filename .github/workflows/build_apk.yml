name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      # Setup Java 17 for Android Gradle build
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      # Install dependencies
      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter

      # Create .env from secrets
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        working-directory: flutter

      # Analyze gate (Fail fast if code is broken)
      - name: Analyze
        run: flutter analyze --fatal-infos
        working-directory: flutter

      # Generate Launcher Icons
      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons
        working-directory: flutter

      # Generate Debug Keystore (Required for release build signed with debug key)
      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US,L=US,S=US"

      # Create dummy google-services.json if missing (Avoids build failure if file is ignored)
      - name: Create dummy google-services.json
        run: |
          target="flutter/android/app/google-services.json"
          if [ ! -f "$target" ]; then
            echo "Creating dummy google-services.json for build..."
            echo '{
              "project_info": {
                "project_number": "123456789012",
                "project_id": "dummy-project",
                "storage_bucket": "dummy-project.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:123456789012:android:abcdef0123456789",
                    "android_client_info": {
                      "package_name": "com.mrswami.chess_trainer"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "dummy_api_key"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }' > "$target"
          fi
        
      # Build Fat APK (single universal APK for easier distribution)
      - name: Build Fat APK
        run: flutter build apk --release
        working-directory: flutter

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Distribute to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: "appdistribution:distribute flutter/build/app/outputs/flutter-apk/app-release.apk --app 1:221089588903:android:b3e0d3131a5bc686361d82 --groups 'testers' --release-notes '🚀 Auto-build from GitHub Actions: ${{ github.event.head_commit.message }}'"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
